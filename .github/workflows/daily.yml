name: Daily AI Content Pipeline

on:
  # 每天北京时间 06:00 触发（UTC 22:00）
  schedule:
    - cron: "0 22 * * *"

  # 手动触发
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: false
        default: "full"
        type: choice
        options:
          - full        # 完整流程
          - fetch-only  # 只采集
          - write-only  # 只写作

env:
  MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
  WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
  WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}

jobs:
  content-pipeline:
    name: 采集 + 写作
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 恢复缓存
        uses: actions/cache@v4
        with:
          path: .cache/
          key: seen-cache-${{ github.run_id }}
          restore-keys: |
            seen-cache-

      - name: 运行
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ "$MODE" = "fetch-only" ]; then
            python main.py --skip-x --fetch-only
          elif [ "$MODE" = "write-only" ]; then
            python main.py --skip-x --write-only
          else
            python main.py --skip-x
          fi

      - name: 上传文章
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: articles-${{ github.run_id }}
          path: output/articles/
          retention-days: 3
